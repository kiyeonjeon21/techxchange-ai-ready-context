<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로그인 — Lakehouse Assistant</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2334e0c4'/%3E%3Cstop offset='.5' stop-color='%23a78bfa'/%3E%3Cstop offset='1' stop-color='%23f5b94a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='32' height='32' rx='9' fill='url(%23g)'/%3E%3Crect x='9' y='9' width='14' height='14' rx='4' fill='%230a0e14'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:wght@500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/app.css" />
  <style>
    .login-wrap{min-height:100vh;display:grid;place-items:center;padding:24px}
    .login-card{width:min(380px,92vw);background:linear-gradient(180deg,var(--surface),var(--ink-2));
      border:1px solid var(--line);border-radius:16px;padding:30px 28px;
      box-shadow:0 24px 70px -34px rgba(0,0,0,.9);animation:rise .5s cubic-bezier(.2,.7,.2,1) both}
    .login-brand{display:flex;align-items:center;gap:12px;margin-bottom:22px}
    .login-brand .mark{width:30px;height:30px;border-radius:9px;flex:none;position:relative;
      background:conic-gradient(from 140deg,var(--teal),var(--violet),var(--amber),var(--teal))}
    .login-brand .mark::after{content:"";position:absolute;inset:6px;border-radius:5px;background:var(--ink)}
    .login-brand h1{font-family:var(--serif);font-size:18px;font-weight:600;margin:0}
    .login-brand p{font-family:var(--mono);font-size:10.5px;color:var(--txt-faint);margin:3px 0 0;letter-spacing:.4px}
    .login-card label{display:block;font-family:var(--mono);font-size:11px;color:var(--txt-dim);
      text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .login-card input{width:100%;background:var(--ink);border:1px solid var(--line);border-radius:10px;
      padding:12px 14px;color:var(--txt);font-family:var(--sans);font-size:15px;outline:none}
    .login-card input:focus{border-color:var(--teal-dim)}
    .login-card button{width:100%;margin-top:14px;border:none;border-radius:11px;padding:12px 0;cursor:pointer;
      font-family:var(--sans);font-weight:600;font-size:15px;color:var(--ink);
      background:linear-gradient(135deg,var(--teal),#27b9a3);transition:.18s}
    .login-card button:hover{transform:translateY(-1px);box-shadow:0 10px 24px -10px var(--teal)}
    .login-card button:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
    .login-err{font-family:var(--mono);font-size:12px;color:#ffc0c0;min-height:16px;margin-top:10px}
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="mesh" aria-hidden="true"></div>
  <div class="login-wrap">
    <form class="login-card" id="form">
      <div class="login-brand">
        <span class="mark" aria-hidden="true"></span>
        <div>
          <h1>Lakehouse&nbsp;Assistant</h1>
          <p>Agentic RAG · Knowledge Graph · watsonx</p>
        </div>
      </div>
      <label for="pw">접근 비밀번호</label>
      <input id="pw" type="password" placeholder="비밀번호를 입력하세요" autocomplete="current-password" autofocus />
      <button id="btn" type="submit">로그인</button>
      <div class="login-err" id="err"></div>
    </form>
  </div>
  <script>
    const form = document.getElementById("form"), pw = document.getElementById("pw"),
          btn = document.getElementById("btn"), err = document.getElementById("err");
    form.addEventListener("submit", async (e) => {
      e.preventDefault(); err.textContent = ""; btn.disabled = true; btn.textContent = "확인 중…";
      try {
        const r = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: pw.value }) });
        if (r.ok) { location.href = "/"; return; }
        err.textContent = "비밀번호가 올바르지 않습니다.";
      } catch (e2) { err.textContent = "오류: " + e2.message; }
      btn.disabled = false; btn.textContent = "로그인"; pw.select();
    });
  </script>
</body>
</html>
